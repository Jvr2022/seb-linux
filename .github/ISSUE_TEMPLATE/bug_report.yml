name: Bug report
description: Report a defect in the Linux port
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
  - type: dropdown
    id: distro
    attributes:
      label: Linux distribution
      options:
        - Arch Linux
        - Ubuntu
        - Debian
        - Fedora
        - openSUSE
        - Other
