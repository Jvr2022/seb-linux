name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
    steps:
      - uses: actions/checkout@v7

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-release-${{ hashFiles('src/**', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-release-

      - name: Resolve release version
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version#v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version#v}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        run: |
          chmod +x scripts/build-release.sh
          scripts/build-release.sh "${{ steps.release_meta.outputs.version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: safe-exam-browser-linux
          path: |
            dist/*.AppImage

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Safe Exam Browser Linux ${{ steps.release_meta.outputs.version }}
          generate_release_notes: true
          body: |
            Thanks to everyone who contributed to this release.

            GitHub generated release notes below include the commit summary and new contributors automatically.
          files: |
            dist/*.AppImage
