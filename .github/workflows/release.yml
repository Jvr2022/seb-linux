name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release version
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version#v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            desktop-file-utils \
            dpkg-dev \
            libqt6svg6-dev \
            qt6-base-dev \
            qt6-tools-dev-tools \
            qt6-webengine-dev \
            shared-mime-info \
            zlib1g-dev

      - name: Build release artifacts
        run: |
          chmod +x scripts/build-release.sh
          scripts/build-release.sh "${{ steps.release_meta.outputs.version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: safe-exam-browser-linux
          path: |
            dist/*.deb
            dist/*.tar.gz

      - name: Resolve previous release tag
        id: previous_tag
        run: |
          current="${{ steps.release_meta.outputs.tag }}"
          previous="$(git tag --sort=-version:refname | grep -Fxv "$current" | head -n1 || true)"
          echo "tag=${previous}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release_meta.outputs.tag }}"
          version="${{ steps.release_meta.outputs.version }}"
          previous="${{ steps.previous_tag.outputs.tag }}"

          payload_file="$(mktemp)"
          if [ -n "$previous" ]; then
            cat > "$payload_file" <<EOF
          {
            "tag_name": "$tag",
            "target_commitish": "$GITHUB_SHA",
            "previous_tag_name": "$previous"
          }
          EOF
          else
            cat > "$payload_file" <<EOF
          {
            "tag_name": "$tag",
            "target_commitish": "$GITHUB_SHA"
          }
          EOF
          fi

          generated_notes="$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            --input "$payload_file" \
            --jq '.body')"

          notes_file="$(mktemp)"
          {
            echo "Thanks to everyone who contributed to this release."
            echo
            echo "$generated_notes"
          } > "$notes_file"

          gh release create "$tag" \
            dist/*.deb \
            dist/*.tar.gz \
            --title "Safe Exam Browser Linux ${version}" \
            --target "$GITHUB_SHA" \
            --notes-file "$notes_file"
