name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-qtwebengine:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
    steps:
      - uses: actions/checkout@v6

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-qtwebengine-${{ hashFiles('src/**', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-qtwebengine-

      - name: Install Qt WebEngine build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            cmake \
            ninja-build \
            libqt6svg6-dev \
            qt6-base-dev \
            qt6-tools-dev-tools \
            qt6-webengine-dev \
            zlib1g-dev

      - name: Build Qt WebEngine backend
        run: ./scripts/build.sh -DSEB_FORCE_QTWEBENGINE=ON

      - name: Upload Qt WebEngine binary
        uses: actions/upload-artifact@v7
        with:
          name: safe-exam-browser-qtwebengine
          path: build/bin/safe-exam-browser
          if-no-files-found: error

  build-webkitgtk-fallback:
    runs-on: ubuntu-24.04
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_mtime,include_file_ctime
    steps:
      - uses: actions/checkout@v6

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-webkitgtk-${{ hashFiles('src/**', 'CMakeLists.txt') }}
          restore-keys: |
            ccache-webkitgtk-

      - name: Install WebKitGTK fallback build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            cmake \
            ninja-build \
            libqt6svg6-dev \
            qt6-base-dev \
            qt6-tools-dev-tools \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            zlib1g-dev

      - name: Build WebKitGTK fallback backend
        run: ./scripts/build.sh -DSEB_FORCE_WEBKITGTK=ON

      - name: Upload WebKitGTK binary
        uses: actions/upload-artifact@v7
        with:
          name: safe-exam-browser-webkitgtk
          path: build/bin/safe-exam-browser
          if-no-files-found: error

  runtime-smoke:
    needs:
      - build-qtwebengine
      - build-webkitgtk-fallback
    runs-on: ubuntu-24.04
    steps:
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libqt6webenginewidgets6 \
            libqt6webenginecore6-bin \
            libqt6webengine6-data \
            libqt6xml6t64 \
            qt6-qpa-plugins \
            libwebkit2gtk-4.1-0 \
            libgtk-3-0t64 \
            zlib1g

      - name: Download Qt WebEngine binary
        uses: actions/download-artifact@v8
        with:
          name: safe-exam-browser-qtwebengine
          path: artifacts/qtwebengine

      - name: Download WebKitGTK binary
        uses: actions/download-artifact@v8
        with:
          name: safe-exam-browser-webkitgtk
          path: artifacts/webkitgtk

      - name: Verify Qt WebEngine runtime
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          chmod +x artifacts/qtwebengine/safe-exam-browser
          ldd artifacts/qtwebengine/safe-exam-browser | grep -q 'libQt6WebEngine'
          ! ldd artifacts/qtwebengine/safe-exam-browser | grep -q 'libwebkit2gtk-4.1'
          artifacts/qtwebengine/safe-exam-browser --version

      - name: Verify WebKitGTK runtime
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          chmod +x artifacts/webkitgtk/safe-exam-browser
          ldd artifacts/webkitgtk/safe-exam-browser | grep -q 'libwebkit2gtk-4.1'
          ! ldd artifacts/webkitgtk/safe-exam-browser | grep -q 'libQt6WebEngine'
          artifacts/webkitgtk/safe-exam-browser --version
