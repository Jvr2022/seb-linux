name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-qtwebengine:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libqt6svg6-dev \
            qt6-base-dev \
            qt6-tools-dev-tools \
            qt6-webengine-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            zlib1g-dev

      - name: Build Qt WebEngine backend
        run: ./scripts/build.sh CONFIG+=force_qtwebengine

  build-webkitgtk-fallback:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libqt6svg6-dev \
            qt6-base-dev \
            qt6-tools-dev-tools \
            qt6-webengine-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            zlib1g-dev

      - name: Build WebKitGTK fallback backend
        run: ./scripts/build.sh CONFIG+=force_webkitgtk

  runtime-smoke:
    needs:
      - build-qtwebengine
      - build-webkitgtk-fallback
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libqt6svg6-dev \
            qt6-base-dev \
            qt6-tools-dev-tools \
            qt6-webengine-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            zlib1g-dev

      - name: Verify Qt WebEngine runtime
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ./scripts/build.sh CONFIG+=force_qtwebengine
          ./build/bin/safe-exam-browser --version

      - name: Verify WebKitGTK runtime
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ./scripts/build.sh CONFIG+=force_webkitgtk
          ./build/bin/safe-exam-browser --version
