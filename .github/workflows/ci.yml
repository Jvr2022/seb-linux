name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libqt6svg6-dev \
            qt6-base-dev \
            qt6-tools-dev-tools \
            qt6-webengine-dev \
            zlib1g-dev

      - name: Build
        run: ./scripts/build.sh

      - name: Verify version
        run: ./build/bin/safe-exam-browser --version
